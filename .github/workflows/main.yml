name: Trello Card & GitHub PR Integration

on:
  pull_request:
    types: [opened, closed, reopened]
  issue_comment:
        types: [created, edited]

jobs:
  trello:
        runs-on: ubuntu-latest
        steps:
          - uses: rematocorp/trello-integration-action@v9.10.1
            with:
              github-token: ${{ secrets.GITHUB_TOKEN }}
              trello-api-key: ${{ secrets.TRELLO_API_KEY }}
              trello-auth-token: ${{ secrets.TRELLO_AUTH_TOKEN }}
              trello-list-id-pr-open: "68bbae1c6450e75827fbbc7d"
              trello-list-id-pr-merged: "68bbae1c6450e75827fbbc7b"
              trello-board-id: "68bbae1c6450e75827fbbc7e"
